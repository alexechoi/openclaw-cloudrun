# All-in-one Cloud Build pipeline (build → push → deploy).
#
# Builds the Cloud Run overlay on top of ghcr.io/openclaw/openclaw:${_OPENCLAW_VERSION}
# (default: latest) and rolls a new revision of the Cloud Run service.
#
# Substitutions:
# - _REGION:            GCP region (e.g. us-central1)
# - _SERVICE_NAME:      Cloud Run service name
# - _REPOSITORY:        Artifact Registry Docker repo (must exist)
# - _IMAGE_NAME:        Image name within the repo (default: openclaw)
# - _OPENCLAW_VERSION:  Upstream openclaw image tag (default: latest)

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'OPENCLAW_VERSION=${_OPENCLAW_VERSION}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
    id: 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}'
    id: 'push'
    waitFor:
      - 'build'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
    id: 'deploy'
    waitFor:
      - 'push'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'

substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'openclaw-gateway'
  _REPOSITORY: 'docker'
  _IMAGE_NAME: 'openclaw'
  _OPENCLAW_VERSION: 'latest'
