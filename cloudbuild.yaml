# Cloud Build configuration for OpenClaw on Cloud Run
# 
# This file is used by Cloud Build to:
# 1. Build the Docker image
# 2. Push to Artifact Registry
# 3. Deploy to Cloud Run
#
# Substitution variables (set by Terraform or manually):
# - _REGION: GCP region (e.g., us-central1)
# - _SERVICE_NAME: Cloud Run service name
# - _REPOSITORY: Artifact Registry repository name
# - _IMAGE_NAME: Container image name (default: openclaw)

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
    id: 'build'

  # Step 2: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}'
    id: 'push'
    waitFor:
      - 'build'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
    id: 'deploy'
    waitFor:
      - 'push'

# Store images in Artifact Registry
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE_NAME}:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout for the entire build (30 minutes)
timeout: '1800s'

# Substitution defaults
substitutions:
  _REGION: 'us-central1'
  _SERVICE_NAME: 'openclaw-gateway'
  _REPOSITORY: 'openclaw-images'
  _IMAGE_NAME: 'openclaw'
